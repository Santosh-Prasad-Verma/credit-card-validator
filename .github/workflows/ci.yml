name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Compile
        run: |
          mkdir -p build/java
          javac -Xlint:all -d build/java CreditCardValidator.java

      - name: Smoke test
        run: printf 'exit\n' | java -cp build/java CreditCardValidator
