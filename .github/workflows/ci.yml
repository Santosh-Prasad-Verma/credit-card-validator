name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile application and tests
        run: |
          mkdir -p build/java
          javac -encoding UTF-8 -Xlint:all -d build/java \
            src/CreditCardValidator.java \
            tests/CreditCardValidatorTest.java

      - name: Run tests
        run: java -cp build/java CreditCardValidatorTest

      - name: Run CLI smoke test
        run: printf 'exit\n' | java -cp build/java CreditCardValidator
